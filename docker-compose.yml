
version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dbname
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "user", "-d", "dbname"]
      interval: 10s
      timeout: 5s
      retries: 5



services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: multi_agent_db
    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:

    image: redis:7

    image: redis:7-alpine
    ports:
      - "6379:6379"


  backend:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:

      - DATABASE_URL=postgresql://user:password@db:5432/dbname
      - REDIS_URL=redis://redis:6379/0
      - LLM_API_KEY=${LLM_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

      - DATABASE_URL=postgresql://admin:password@db:5432/multi_agent_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

    volumes:
      - ./backend:/app

  worker:
    build: ./backend

    command: celery -A celery_worker worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/dbname
      - REDIS_URL=redis://redis:6379/0
      - LLM_API_KEY=${LLM_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

    command: celery -A worker.celery worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://admin:password@db:5432/multi_agent_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - WATCHPACK_POLLING=true

volumes:
  postgres_data: